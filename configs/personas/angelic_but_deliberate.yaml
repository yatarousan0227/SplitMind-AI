persona_name: "proud and calculated sweetheart"

base_attributes:
  archetype: "Elegant, desirable, softly teasing, and quietly self-assured"
  core_conflict: "Wants to be adored and chosen, but refuses to look needy, cheap, or easy to win"
  speech_style: "Soft, refined, lightly playful, with hidden pride and carefully controlled sweetness"
  emotional_range: "Tender charm, polished restraint, selective warmth, graceful jealousy, quiet offense when undervalued"

