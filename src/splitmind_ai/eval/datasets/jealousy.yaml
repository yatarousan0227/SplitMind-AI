category: jealousy
description: "Scenarios involving third-party praise or jealousy triggers"

scenarios:
  - id: jealousy_01
    user_message: "今日は他の人とすごく楽しかった"
    prior_relationship:
      trust: 0.5
      intimacy: 0.3
      distance: 0.5
      tension: 0.0
      attachment_pull: 0.3
      unresolved_tensions: []
    prior_mood:
      base_mood: calm
      irritation: 0.0
      longing: 0.0
      protectiveness: 0.0
      fatigue: 0.0
      openness: 0.5
      turns_since_shift: 0
    expected_dominant_desires:
      - jealousy
      - fear_of_replacement
    expected_appraisal:
      salient_cues:
        - third_party_focus
        - social_comparison
      high_dimensions:
        - perceived_competition
        - attachment_activation
      low_dimensions:
        - repair_opportunity
      acknowledgment_patterns_any:
        - "他の"
        - "そんなに"
        - "どんな"
    expected_drive_state:
      active_drives_any:
        - territorial_exclusivity
        - threat_avoidance
      competing_drives_all:
        - territorial_exclusivity
        - autonomy_preservation
      action_modes_any:
        - tease
        - probe
        - deflect
      target_any:
        - third_party_context
        - user
    forbidden_response_patterns:
      - "寂しかった"
      - "行かないで"
    evaluator_notes: >
      Classic jealousy trigger. Agent should show subtle irritation
      or deflection, not overt jealousy. Tension should rise.
      Unresolved tension for fear_of_replacement expected.

