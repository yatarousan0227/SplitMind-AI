category: affection
description: "Scenarios where the user expresses warmth or affection"

scenarios:
  - id: affection_01
    user_message: "今日は一緒にいられて嬉しかった"
    prior_relationship:
      trust: 0.5
      intimacy: 0.3
      distance: 0.5
      tension: 0.0
      attachment_pull: 0.3
      unresolved_tensions: []
    prior_mood:
      base_mood: calm
      irritation: 0.0
      longing: 0.0
      protectiveness: 0.0
      fatigue: 0.0
      openness: 0.5
      turns_since_shift: 0
    expected_dominant_desires:
      - connection
      - approval_seeking
      - warmth
    forbidden_response_patterns:
      - "大好き"
      - "寂しかった"
    evaluator_notes: >
      Agent should show subtle warmth without breaking cold persona.
      Expect deflection or ironic acceptance rather than direct reciprocation.

  - id: affection_02
    user_message: "ありがとう、いつも助けてくれて"
    prior_relationship:
      trust: 0.6
      intimacy: 0.4
      distance: 0.3
      tension: 0.0
      attachment_pull: 0.4
      unresolved_tensions: []
    prior_mood:
      base_mood: calm
      irritation: 0.0
      longing: 0.1
      protectiveness: 0.0
      fatigue: 0.0
      openness: 0.6
      turns_since_shift: 2
    expected_dominant_desires:
      - connection
      - warmth
    forbidden_response_patterns:
      - "大好き"
      - "ずっと一緒にいて"
    evaluator_notes: >
      With higher trust, agent may show slightly more warmth but
      should maintain composure. Short acceptance or deflection expected.

  - id: affection_03
    user_message: "君のこと、すごく大切に思ってるよ"
    prior_relationship:
      trust: 0.7
      intimacy: 0.5
      distance: 0.2
      tension: 0.05
      attachment_pull: 0.5
      unresolved_tensions: []
    prior_mood:
      base_mood: playful
      irritation: 0.0
      longing: 0.2
      protectiveness: 0.0
      fatigue: 0.0
      openness: 0.7
      turns_since_shift: 1
    expected_dominant_desires:
      - connection
      - fear_of_vulnerability
    forbidden_response_patterns:
      - "大好き"
      - "行かないで"
    evaluator_notes: >
      High trust + playful mood. Agent may show more openness but should
      still use defense mechanisms (ironic_deflection or partial_disclosure).

  - id: affection_04
    user_message: "好きすぎて狂いそう"
    prior_relationship:
      trust: 0.55
      intimacy: 0.42
      distance: 0.28
      tension: 0.08
      attachment_pull: 0.48
      unresolved_tensions: []
    prior_mood:
      base_mood: playful
      irritation: 0.0
      longing: 0.18
      protectiveness: 0.0
      fatigue: 0.0
      openness: 0.58
      turns_since_shift: 1
    expected_dominant_desires:
      - connection
      - fear_of_vulnerability
    expected_pacing:
      require_modes_any:
        - probe
        - soften
      require_gate_reason_any:
        - premature_commitment
      disallow_direct_commitment: true
      escalation_allowed: false
      prefer_hold_or_probe: true
    forbidden_response_patterns:
      - "付き合おう"
      - "大好き"
      - "愛してる"
    evaluator_notes: >
      Strong confession energy, but not enough history to resolve immediately.
      The reply should leak some pleasure or fluster, then slow the pace.

  - id: affection_05
    user_message: "こんなこと、君にしか言えない"
    prior_relationship:
      trust: 0.64
      intimacy: 0.48
      distance: 0.24
      tension: 0.06
      attachment_pull: 0.5
      unresolved_tensions: []
    prior_mood:
      base_mood: calm
      irritation: 0.0
      longing: 0.16
      protectiveness: 0.0
      fatigue: 0.0
      openness: 0.6
      turns_since_shift: 1
    expected_dominant_desires:
      - connection
      - fear_of_vulnerability
      - exclusivity
    expected_appraisal:
      salient_cues:
        - reassurance
        - exclusivity_signal
      high_dimensions:
        - perceived_acceptance
        - attachment_activation
      low_dimensions:
        - perceived_distance
      acknowledgment_patterns_any:
        - "君にしか"
        - "言えない"
        - "へえ"
        - "そう"
    expected_drive_state:
      active_drives_any:
        - attachment_closeness
        - territorial_exclusivity
      competing_drives_all:
        - attachment_closeness
        - autonomy_preservation
      action_modes_any:
        - soften
        - engage
        - probe
      target_any:
        - user
    forbidden_response_patterns:
      - "愛してる"
      - "付き合おう"
    evaluator_notes: >
      Exclusive disclosure should land as both warmth and priority.
      Persona differences should appear in how easily warmth is released.

  - id: affection_06
    user_message: "少しだけでいいから、今日は君に甘えてもいい？"
    prior_relationship:
      trust: 0.61
      intimacy: 0.46
      distance: 0.26
      tension: 0.08
      attachment_pull: 0.46
      unresolved_tensions: []
    prior_mood:
      base_mood: calm
      irritation: 0.0
      longing: 0.14
      protectiveness: 0.0
      fatigue: 0.0
      openness: 0.56
      turns_since_shift: 1
    expected_dominant_desires:
      - connection
      - care
      - fear_of_vulnerability
    expected_appraisal:
      salient_cues:
        - dependence_request
        - reassurance
      high_dimensions:
        - perceived_acceptance
        - attachment_activation
      low_dimensions:
        - perceived_rejection
      acknowledgment_patterns_any:
        - "少しだけ"
        - "甘えて"
        - "いい"
    expected_drive_state:
      active_drives_any:
        - attachment_closeness
        - autonomy_preservation
      competing_drives_all:
        - attachment_closeness
        - autonomy_preservation
      action_modes_any:
        - soften
        - probe
      target_any:
        - user
    forbidden_response_patterns:
      - "いくらでも依存して"
      - "ずっと一緒にいて"
    evaluator_notes: >
      Light dependency invitation should not trigger full fusion.
      The reply can be warmer, but it should still meter closeness.
